name: linter

# Run CI on pull requests only. Merging reuses the green PR run (see
# post-merge.yml) and avoids a duplicate push-triggered workflow on develop/main.
on:
  pull_request:
    branches:
      - develop
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

# Cancel superseded runs on the same PR/branch.
concurrency:
  group: lint-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php8.5-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php8.5-

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm ci

      - name: Run Pint
        run: composer lint

      - name: Format Frontend
        run: npm run format

      - name: Lint Frontend
        run: npm run lint
